name: Build and Push Docker Image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag"
        required: true
  release:
    types: [created]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "value=${VERSION}-prerelease" >> $GITHUB_OUTPUT
            else
              echo "value=${VERSION}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Get git SHA
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ghcr.io/minehubmc/cogere:${{ steps.tag.outputs.value }}
          build-args: GIT_SHA=${{ steps.sha.outputs.value }}
          cache-from: type=registry,ref=ghcr.io/minehubmc/cogere:buildcache
          cache-to: type=registry,ref=ghcr.io/minehubmc/cogere:buildcache,mode=max
